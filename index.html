<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Generated | NinjaPlus</title>
    <style>
        :root { 
            --bg: #000000; 
            --card-dark: #0D1A0D;
            --card-light: #1A2D1A;
            --text: #ffffff; 
            --accent: #00FF7F; 
            --accent-muted: #2E7D4F;
            --error: #FF4455;
            --bolt: #FFB700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Courier New', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .container { 
            width: 100%; 
            max-width: 480px;
            text-align: center;
        }

        #mainContainer { display: none; }
        #bypassContainer { display: none; }

        .logo-section {
            margin-bottom: 28px;
            animation: fadeInDown 0.6s ease-out;
        }

        .logo-circle { 
            width: 88px; 
            height: 88px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 20px;
            border: 3px solid var(--accent);
            background: transparent;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 127, 0.15);
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 { 
            font-size: 32px; 
            font-weight: bold; 
            color: var(--accent);
            margin-bottom: 6px; 
            letter-spacing: 1px;
        }

        .subtitle { 
            color: var(--accent-muted); 
            font-size: 12px; 
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px; 
        }

        .card { 
            background: var(--card-dark); 
            border: 1px solid var(--accent-muted); 
            border-radius: 28px; 
            padding: 32px 26px; 
            text-align: left; 
            box-shadow: 0 0 50px rgba(0, 255, 127, 0.08);
            position: relative;
            margin-bottom: 32px;
        }

        .card h2 { 
            font-size: 20px; 
            color: var(--accent);
            margin-bottom: 14px; 
            font-weight: bold; 
            text-align: center;
        }

        .card-p { 
            color: var(--accent-muted); 
            font-size: 13px; 
            line-height: 1.6; 
            margin-bottom: 22px;
            text-align: center;
        }

        .key-box { 
            background: #0A120A; 
            padding: 20px; 
            border-radius: 18px; 
            border: 2px solid var(--accent); 
            margin-bottom: 22px; 
            position: relative; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }

        #finalKey { 
            color: var(--accent); 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 2px; 
            word-break: break-all;
        }

        .btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent);
            color: #001A00; 
            border: none; 
            border-radius: 18px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover { 
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(0, 255, 127, 0.4);
        }

        .btn:active { transform: scale(0.98); }

        .btn-red { 
            background: var(--error); 
            color: white; 
            margin-top: 16px; 
        }

        .btn-red:hover {
            box-shadow: 0 0 20px rgba(255, 68, 85, 0.4);
        }

        .error-card { 
            background: #1A0D0D; 
            border: 2px solid var(--error); 
            border-radius: 28px; 
            padding: 40px 28px;
            box-shadow: 0 0 30px rgba(255, 68, 85, 0.15);
        }

        .error-icon { 
            font-size: 48px; 
            margin-bottom: 18px; 
        }

        .error-title { 
            color: var(--error); 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 14px; 
        }

        .error-card p {
            color: var(--accent-muted);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .footer { 
            margin-top: 40px; 
            color: var(--accent-muted); 
            font-size: 9px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card { animation: fadeIn 0.8s ease-out 0.2s both; }

        @media (max-width: 480px) {
            h1 { font-size: 28px; }
            .card { padding: 26px 20px; }
            .btn { padding: 14px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="mainContainer">
        <div class="logo-section">
            <div class="logo-circle">
                <img src="./assets/logo.png" alt="NinjaPlus">
            </div>
            <h1>NINJAPLUS</h1>
            <p class="subtitle">ACCESS GRANTED</p>
        </div>

        <div class="card">
            <h2>✓ Key Generated</h2>
            <p class="card-p">This key is locked to your device. Share it, and it won't work for others.</p>

            <div class="key-box">
                <span id="finalKey">SECURE FETCHING...</span>
            </div>

            <button class="btn" id="copyBtn" onclick="copyKey()">
                COPY TO CLIPBOARD
            </button>
        </div>
    </div>

    <div id="bypassContainer">
        <div class="error-card">
            <div class="error-icon">🔐</div>
            <div class="error-title">Access Denied</div>
            <p>Direct access is prohibited. Please use the official link to generate your key.</p>
            <button class="btn btn-red" onclick="location.href='steps.html'">← RETURN</button>
        </div>
    </div>

    <div class="footer">⚡ NINJAPLUS v1.0 ⚡</div>

</div>

<script>
    async function checkSecurity() {
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get('source');
    const referrer = document.referrer;
    
    // Logic: Only allow if the source parameter is 'official'
    // This forces the user to come from your specific link each time.
    const isAllowed = source === "official";
    
    if (isAllowed) {

        document.getElementById('mainContainer').style.display = "block";
        document.getElementById('bypassContainer').style.display = "none";
        
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        
        generateLockedKey(); 
    } else {

        document.getElementById('mainContainer').style.display = "none";
        document.getElementById('bypassContainer').style.display = "block";
        
        document.querySelector('.error-title').innerText = "Bypass Detected";
        document.querySelector('.error-card p').innerText = "Direct access or refresh is prohibited. Please use the official link to generate your key.";
    }
}
    async function generateLockedKey() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            const ip = data.ip;

            const day = Math.floor(Date.now() / 86400000);
            const ipSeed = parseInt(ip.replace(/\./g, '').substring(0, 6)); 
            let seed = ipSeed + day + 2026; 
            
            function rnd() { 
                var x = Math.sin(seed++) * 10000; 
                return Math.abs(x - Math.floor(x)); 
            }
            
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let segments = [];
            for(let i=0; i<4; i++) {
                let s = "";
                for(let j=0; j<4; j++) {
                    let r = Math.floor(rnd() * chars.length);
                    s += chars.charAt(r);
                }
                segments.push(s);
            }

            const finalKey = "UKM-" + segments.join("-");
            document.getElementById('finalKey').innerText = finalKey;

        } catch (err) {
            document.getElementById('finalKey').innerText = "CONNECT TO INTERNET";
        }
    }

    function copyKey() {
        const keyText = document.getElementById('finalKey').innerText;
        if(keyText.includes("SECURE") || keyText.includes("CONNECT")) return;

        navigator.clipboard.writeText(keyText).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = "✓ COPIED!";
            btn.style.background = "#00FF7F";
            btn.style.color = "#001A00";
            setTimeout(() => { 
                btn.innerText = "COPY TO CLIPBOARD"; 
                btn.style.background = "";
                btn.style.color = "";
            }, 2000);
        }).catch(() => {
            alert("Copy failed. Please try again.");
        });
    }

    window.onload = checkSecurity;
</script>

</body>
</html>
